{% extends 'base.html' %}

{% block page_title %}Dashboard{% endblock %}

{% block content %}
<div class="container">
    <h1 class="mb-4">
        <i class="bi bi-speedometer2"></i> Dashboard
    </h1>

    <div class="row mb-4">
        <div class="col-md-4 mb-3">
            <div class="card text-bg-primary shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title text-white-50">Total de RDOs</h6>
                            <h2 class="text-white">{{ total_rdos }}</h2>
                        </div>
                        <i class="bi bi-file-earmark-text" style="font-size: 3rem; opacity: 0.3;"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card text-bg-success shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title text-white-50">Total de Funcionários</h6>
                            <h2 class="text-white">{{ total_funcionarios }}</h2>
                        </div>
                        <i class="bi bi-people-fill" style="font-size: 3rem; opacity: 0.3;"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card text-bg-info shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title text-white-50">RDOs esta Semana</h6>
                            <h2 class="text-white">{{ rdos_semana }}</h2>
                        </div>
                        <i class="bi bi-calendar-week" style="font-size: 3rem; opacity: 0.3;"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <a href="{% url 'rdo-lista' %}" class="btn btn-primary btn-lg">
                <i class="bi bi-list-ul"></i> Ver Todos os RDOs
            </a>
            <a href="{% url 'rdo-criar' %}" class="btn btn-success btn-lg">
                <i class="bi bi-plus-circle"></i> Novo RDO
            </a>
        </div>
    </div>
</div>
{% endblock %}
