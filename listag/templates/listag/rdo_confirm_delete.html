{% extends 'base.html' %}

{% block page_title %}Deletar RDO{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-danger">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0">
                        <i class="bi bi-exclamation-triangle"></i> Confirmar Exclusão
                    </h5>
                </div>
                <div class="card-body">
                    <p>Tem certeza que deseja deletar este RDO?</p>
                    <div class="alert alert-warning" role="alert">
                        <strong>{{ rdo.obra }}</strong> - {{ rdo.data|date:"d/m/Y" }}
                    </div>
                    <p class="text-muted">Esta ação não pode ser desfeita.</p>
                </div>
                <div class="card-footer bg-white">
                    <form method="post" style="display: inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash"></i> Sim, deletar
                        </button>
                    </form>
                    <a href="{% url 'rdo-detalhes' rdo.pk %}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Cancelar
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
